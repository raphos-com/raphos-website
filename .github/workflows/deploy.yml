name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/raphos-website-redesign-emtteu
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment, cancelling in-progress runs on the same ref.
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Build runs on every branch / PR as a validation step.
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Astro site
        uses: withastro/action@v3
        with:
          node-version: 22

  # Deploy only from the production branch (main). GitHub Pages serves a single
  # site, so deploying from a feature branch would overwrite production.
  # Requires Pages to be enabled: Settings -> Pages -> Source = "GitHub Actions".
  deploy:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
